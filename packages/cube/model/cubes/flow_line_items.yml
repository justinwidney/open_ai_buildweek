cubes:
  - name: flow_line_items
    sql_table: flow_line_items
    description: >-
      Long/tidy monthly cash flows across every domain (income, expense,
      debt) via a domain + view_key pair, so a new domain or named view is a
      new column value, never a migration. This is the grain behind "income
      breakdown by view over time" and "spending over time." amount_cents is
      a per-month flow, so summing across a period is meaningful.

    joins:
      - name: runs
        sql: "{CUBE}.run_id = {runs}.id"
        relationship: many_to_one

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true

      - name: run_id
        sql: run_id
        type: string

      - name: month
        sql: month
        type: number

      - name: domain
        sql: domain
        type: string
        description: income | expense | debt.

      - name: view_key
        sql: view_key
        type: string
        description: >-
          The named view of the amount, e.g. income's gross/takeHome/afterTax,
          expense's outOfPocket, debt's principalPortion/interestPortion.

      - name: entity_id
        sql: entity_id
        type: string

      - name: entity_label
        sql: entity_label
        type: string

    measures:
      - name: count
        type: count

      - name: amount
        sql: "{CUBE}.amount_cents / 100.0"
        type: sum
        description: Summed flow amount in dollars over the selected period/grouping.

      - name: amount_cents
        sql: amount_cents
        type: sum
