<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8db7d9" />
    <meta name="description" content="Travel through a watercolor life map, make decisions at each crossroads, and see how every choice changes your financial path." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Conquer Your Path" />
    <meta property="og:description" content="Choose a route through an interactive watercolor life and financial planning world." />
    <meta property="og:image" content="/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Conquer Your Path" />
    <meta name="twitter:description" content="Choose a route through an interactive watercolor life and financial planning world." />
    <meta name="twitter:image" content="/og.png" />
    <title>Conquer Your Path</title>

    <!-- Painted on the first byte, before any stylesheet or module resolves.
         Without it the page is white until React mounts -- and in dev, where
         Vite injects CSS through JS, that is the whole module graph. -->
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { background: #8db7d9; }
    </style>

    <!-- Fetch the home art alongside the app code rather than after it mounts,
         so the reveal is ready to play the moment the screen appears. -->
    <link rel="preload" as="image" href="/home/road-backdrop.webp" type="image/webp" />
    <link rel="preload" as="image" href="/home/wash-mask.webp" type="image/webp" />
    <link rel="preload" as="image" href="/home/wash-01.webp" type="image/webp" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
